services:
  mysql_db:
    image: mysql:8.0
    container_name: expense_tracker_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: expense_tracker
      MYSQL_USER: hakeem_dev
      MYSQL_PASSWORD: dev_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
